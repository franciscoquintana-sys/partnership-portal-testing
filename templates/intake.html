{% extends "base.html" %}
{% block hero %}<style>.topbar{display:none}</style>{% endblock %}
{% block content %}

  <!-- Dark banner -->
  <div style="
    background: linear-gradient(120deg, #0a1628 70%, #0f2044 100%);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  ">
    <div style="position:absolute;right:-40px;top:-40px;width:300px;height:200px;background:radial-gradient(ellipse,rgba(79,70,229,0.25) 0%,transparent 70%);pointer-events:none"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:6px">Partners Portal <span style="color:rgba(255,255,255,0.35);font-weight:400">|</span> Intake and Outreach Form</div>
        <div style="font-size:13px;color:#94a3b8">Coming soon.</div>
      </div>
      <a href="/logout" style="font-family:var(--font);font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:6px 14px;text-decoration:none;white-space:nowrap;position:relative;z-index:1;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">Sign out</a>
    </div>
  </div>

{% endblock %}
