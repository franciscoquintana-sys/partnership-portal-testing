{% extends "base.html" %}
{% block hero %}
<style>.topbar{display:none}</style>
{% endblock %}
{% block content %}

  <!-- Dark banner -->
  <div style="
    background: linear-gradient(120deg, #0a1628 70%, #0f2044 100%);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  ">
    <div style="position:absolute;right:-40px;top:-40px;width:300px;height:200px;background:radial-gradient(ellipse,rgba(79,70,229,0.25) 0%,transparent 70%);pointer-events:none"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:6px">Partners Portal <span style="color:rgba(255,255,255,0.35);font-weight:400">|</span> Sales Deck</div>
        <div style="font-size:13px;color:#94a3b8">Generate a tailored partner brief from any client URL.</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;position:relative;z-index:1">
        <button
          id="copy-deck-link"
          type="button"
          style="font-family:var(--font);font-size:12px;font-weight:600;color:#fff;background:rgba(124,137,239,0.18);border:1px solid rgba(124,137,239,0.45);border-radius:7px;padding:6px 14px;cursor:pointer;white-space:nowrap;transition:background 0.15s"
          onmouseover="this.style.background='rgba(124,137,239,0.32)'"
          onmouseout="this.style.background='rgba(124,137,239,0.18)'"
        >Copy interactive deck link</button>
        <a href="/logout" style="font-family:var(--font);font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:6px 14px;text-decoration:none;white-space:nowrap;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">Sign out</a>
      </div>
    </div>
  </div>

  <!-- Sales-deck SPA -->
  <div class="card" style="padding:0;overflow:hidden;border-radius:12px;max-width:1280px;margin:0 auto">
    <iframe id="sales-deck-iframe" src="/sales-deck/" title="Sales Deck" style="display:block;width:100%;height:calc(100vh - 180px);min-height:600px;border:0"></iframe>
  </div>

  <script>
    (function () {
      const btn = document.getElementById('copy-deck-link');
      const frame = document.getElementById('sales-deck-iframe');
      if (!btn || !frame) return;
      const defaultLabel = btn.textContent;
      btn.addEventListener('click', async function () {
        let url = null;
        try {
          // Same-origin iframe — read the React app's exposed helper.
          const fn = frame.contentWindow && frame.contentWindow.getDeckShareLink;
          if (typeof fn === 'function') url = fn();
        } catch (_) { /* ignored */ }
        if (!url) {
          btn.textContent = 'Generate a deck first';
          setTimeout(function () { btn.textContent = defaultLabel; }, 1800);
          return;
        }
        try {
          await navigator.clipboard.writeText(url);
          btn.textContent = '✓ Link copied';
        } catch (_) {
          window.prompt('Copy this link:', url);
        }
        setTimeout(function () { btn.textContent = defaultLabel; }, 1800);
      });
    })();
  </script>

{% endblock %}
