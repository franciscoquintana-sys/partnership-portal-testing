<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAPO · Sign In</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://cdn.prod.website-files.com/65e210a414fae2cb8054a9b4/6848341e705863943015c5af_YUNO_ISOLOGO_BLUE.png" alt="Yuno" style="width:48px;height:48px;object-fit:contain">
    </div>
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Enter your access code to continue.</div>
    <form method="post" action="/login">
      <label class="login-label" for="code">Access Code</label>
      <input class="login-input" type="password" id="code" name="code" placeholder="••••••••" autocomplete="off" autofocus>
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      <button class="login-btn" type="submit">Continue</button>
    </form>
  </div>
</div>
</body>
</html>
