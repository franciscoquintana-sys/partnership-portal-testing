<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuno Partnerships Portal · Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg?v=5">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon_y.png?v=5">
  <link rel="shortcut icon" type="image/png" href="/static/img/favicon_y.png?v=5">
  <link rel="apple-touch-icon" href="/static/img/favicon_y.png?v=5">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .role-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .role-card {
      width: 100%; padding: 14px 16px;
      border: 1px solid #e2e8f0; border-radius: 10px;
      background: #fff; cursor: pointer; text-align: left;
      font-family: inherit; transition: border-color .15s, box-shadow .15s, background .15s;
      display: flex; flex-direction: column; gap: 4px;
    }
    .role-card:hover { border-color: #4F46E5; box-shadow: 0 2px 10px rgba(79,70,229,.08); background: #f8f7ff; }
    .role-card-title { font-size: 13.5px; font-weight: 700; color: #0f172a; }
    .role-card-sub { font-size: 11.5px; color: #64748b; }
    .step-form { display: flex; flex-direction: column; gap: 12px; }
    .pw-input {
      width: 100%; padding: 11px 12px; box-sizing: border-box;
      font-size: 13px; font-family: inherit;
      border: 1px solid #e2e8f0; border-radius: 8px; outline: none;
    }
    .pw-input:focus { border-color: #4F46E5; }
    .submit-btn {
      width: 100%; padding: 11px 14px;
      border: 0; border-radius: 8px; cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 700;
      color: #fff; background: #4F46E5;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      transition: background .15s;
    }
    .submit-btn:hover { background: #4338ca; }
    .back-link {
      align-self: flex-start; background: none; border: 0;
      color: #64748b; font-size: 11.5px; font-weight: 600;
      cursor: pointer; padding: 0; font-family: inherit;
    }
    .back-link:hover { color: #4F46E5; }
    .step-context {
      font-size: 12px; color: #475569;
      padding: 9px 12px; background: #f8fafc; border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .step-context strong { color: #0f172a; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card" style="padding-top:28px;">
    <div style="margin-bottom:20px;">
      <img src="https://cdn.prod.website-files.com/65e210a414fae2cb8054a9b4/6848341e705863943015c5af_YUNO_ISOLOGO_BLUE.png" alt="Yuno" style="width:96px;height:96px;object-fit:contain;display:block;margin-left:-4px;">
    </div>
    <div class="login-title">Partnerships Portal</div>
    <div class="login-sub">Sign in with your Yuno account to continue.</div>
    {% if error %}
    <div class="login-error" style="margin-bottom:18px;">{{ error }}</div>
    {% endif %}

    <!-- Step 1: pick a role -->
    <div id="step-role" class="role-options">
      <button type="button" class="role-card" onclick="pickRole('internal')">
        <span class="role-card-title">Internal</span>
        <span class="role-card-sub">General access for any Yuno team member.</span>
      </button>
      <button type="button" class="role-card" onclick="pickRole('partnerships')">
        <span class="role-card-title">Partnerships Team</span>
        <span class="role-card-sub">Full access including Performance section. Password required.</span>
      </button>
    </div>

    <!-- Step 2: continue with Google (All Yuno Teams) -->
    <form method="POST" action="/auth/select-role" id="step-all" class="step-form" style="display:none">
      <button type="button" class="back-link" onclick="goBack()">← Back</button>
      <div class="step-context">Signing in as <strong>Internal</strong>.</div>
      <input type="hidden" name="role" value="internal">
      <button type="submit" class="submit-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </form>

    <!-- Step 2: password + Google (Partnerships Team) -->
    <form method="POST" action="/auth/select-role" id="step-part" class="step-form" style="display:none">
      <button type="button" class="back-link" onclick="goBack()">← Back</button>
      <div class="step-context">Signing in as <strong>Partnerships Team</strong>. Enter the team password to continue.</div>
      <input type="hidden" name="role" value="partnerships">
      <input type="password" name="password" id="pw-input" class="pw-input" placeholder="Partnerships Team password" autocomplete="current-password" required>
      <button type="submit" class="submit-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </form>

    <div style="text-align:center;margin-top:16px;">
      <span style="font-size:11px;color:#A5B4FC;font-weight:700;">Only @y.uno accounts are permitted</span>
    </div>
  </div>
</div>
<script>
  function pickRole(role) {
    document.getElementById('step-role').style.display = 'none';
    if (role === 'internal') {
      document.getElementById('step-all').style.display = 'flex';
    } else {
      document.getElementById('step-part').style.display = 'flex';
      setTimeout(() => document.getElementById('pw-input').focus(), 50);
    }
  }
  function goBack() {
    document.getElementById('step-all').style.display = 'none';
    document.getElementById('step-part').style.display = 'none';
    document.getElementById('step-role').style.display = 'flex';
  }
</script>
</body>
</html>
