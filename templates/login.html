<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuno Partnerships Portal · Sign In</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card" style="padding-top:28px;">
    <div style="margin-bottom:20px;">
      <img src="https://cdn.prod.website-files.com/65e210a414fae2cb8054a9b4/6848341e705863943015c5af_YUNO_ISOLOGO_BLUE.png" alt="Yuno" style="width:96px;height:96px;object-fit:contain;display:block;margin-left:-4px;">
    </div>
    <div class="login-title">Partnerships Portal</div>
    <div class="login-sub">Sign in with your Yuno account to continue.</div>
    {% if error %}
    <div class="login-error" style="margin-bottom:18px;">{{ error }}</div>
    {% endif %}
    <a href="/auth/google" class="login-btn" style="display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:16px;">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </a>
    <div style="text-align:center;margin-top:12px;">
      <span style="font-size:11px;color:#A5B4FC;font-weight:700;">Only @y.uno accounts are permitted</span>
    </div>
  </div>
</div>
</body>
</html>
